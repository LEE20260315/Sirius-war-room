<body class="bg-surface-base text-ink font-sans min-h-screen">
<div id="toast" class="toast"></div>

<header class="bg-surface-elevated border-b border-edge-divider px-5 py-3 flex items-center justify-between">
  <h1 class="font-display text-lg text-brand-500 font-medium tracking-tight">
    Sirius <span class="text-ink-muted font-serif italic">期货作战室</span>
  </h1>
  <div class="flex items-center gap-4 text-sm text-ink-muted">
    <span>起始: <span id="headerInitEquity" class="text-ink font-mono">15,000</span> | 目标: <span id="headerTarget" class="text-ink font-mono">1,000,000</span></span>
    <button id="themeBtn" onclick="FTApp.toggleTheme()" title="切换深色/浅色主题" class="flex items-center gap-1 text-ink-dim hover:text-ink text-xs transition-colors duration-300 px-2 py-1 rounded hover:bg-surface-hover"><span id="themeIcon" style="transition:transform 0.3s;display:inline-block">&#9790;</span><span id="themeLabel">深色</span></button>
    </div>
</header>
<div class="sync-bar bg-surface-elevated border-b border-edge px-4 py-1.5 text-xs flex items-center justify-between">
  <span id="syncStatus" class="text-ink-muted"><span class="status-dot offline"></span>云同步: 未配置</span>
  <div class="flex items-center gap-3">
    <span class="text-ink-faint">账户:</span>
    <div class="account-switcher inline-flex rounded-sm border border-edge overflow-hidden">
      <button id="acctBtnSim" onclick="FTApp.switchAccount('sim')" class="px-3 py-0.5 text-xs bg-surface-base text-ink-muted">模拟盘</button>
      <button id="acctBtnReal" onclick="FTApp.switchAccount('real')" class="px-3 py-0.5 text-xs bg-brand-500 text-brand-50 active">实盘</button>
    </div>
    <span id="accountBadge" class="text-ink-muted">实盘</span>
  </div>
</div>
<nav class="bg-surface-elevated border-b border-edge flex overflow-x-auto">
  <a href="pool.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">观察池</a>
  <a href="fundamental.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">基本面</a>
  <a href="signal.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">信号引擎</a>
  <a href="trade.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">模拟交易</a>
  <a href="real-trade.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors border-b-2 border-brand-500 text-brand-500">实盘录入</a>
  <a href="journal.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">交易日志</a>
  <a href="dashboard.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">仪表盘</a>
  <a href="settings.html" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap transition-colors text-ink-dim hover:text-ink-muted hover:bg-surface-hover">设置</a>
</nav>
<main class="max-w-5xl mx-auto px-5 py-6 page-enter">
  <!-- 实盘成交录入 -->
  <div class="bg-surface rounded-lg border border-edge-subtle p-5 mb-6">
    <h2 class="font-serif text-xl text-ink-secondary mb-4">实盘成交录入</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- 合约搜索 + 下拉 -->
      <div class="form-group md:col-span-2">
        <label>合约(按交易所分组,支持搜索)</label>
        <input id="rtContractSearch" type="text" placeholder="输入代码或中文名筛选,如 CU / 铜 / CU2609" class="w-full px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500" oninput="FTRealTrade.filterContracts()">
        <select id="rtContract" class="w-full mt-2 px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500" onchange="FTRealTrade.onContractChange()">
          <!-- JS 动态填充 optgroup -->
        </select>
        <div class="form-help" id="rtContractMeta">乘数:- / 保证金率:- / 合约:-</div>
      </div>
      <!-- 交易类型按钮(6 个) -->
      <div class="form-group md:col-span-2">
        <label>交易类型</label>
        <div class="flex flex-wrap gap-2 mt-1" id="rtTradeTypeBtns">
          <button type="button" class="trade-type-btn" data-type="long_open">多开</button>
          <button type="button" class="trade-type-btn" data-type="long_add">多加</button>
          <button type="button" class="trade-type-btn" data-type="long_close">多平</button>
          <button type="button" class="trade-type-btn" data-type="short_open">空开</button>
          <button type="button" class="trade-type-btn" data-type="short_add">空加</button>
          <button type="button" class="trade-type-btn" data-type="short_close">空平</button>
        </div>
        <div class="form-help" id="rtTradeTypeHint">请选择交易类型</div>
      </div>
      <!-- 价格 + 手数 -->
      <div class="form-group">
        <label>成交价格</label>
        <input id="rtPrice" type="number" step="0.0001" min="0" class="w-full px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500">
      </div>
      <div class="form-group">
        <label>手数</label>
        <input id="rtVolume" type="number" step="1" min="1" value="1" class="w-full px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500">
      </div>
      <!-- 止损止盈(仅 *_open 显示) -->
      <div class="form-group" id="rtStopLossGroup" style="display:none">
        <label>止损价</label>
        <input id="rtStopLoss" type="number" step="0.0001" min="0" class="w-full px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500">
        <div class="form-help" id="rtStopLossHint"></div>
      </div>
      <div class="form-group" id="rtTakeProfitGroup" style="display:none">
        <label>止盈价</label>
        <input id="rtTakeProfit" type="number" step="0.0001" min="0" class="w-full px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500">
      </div>
      <!-- 理由/原因(动态切换) -->
      <div class="form-group md:col-span-2" id="rtReasonGroup">
        <label id="rtReasonLabel">理由</label>
        <select id="rtReason" class="w-full px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500">
          <!-- JS 动态填充 -->
        </select>
      </div>
      <!-- 成交时间 -->
      <div class="form-group md:col-span-2">
        <label>成交时间</label>
        <div class="flex gap-2">
          <input id="rtTradeTime" type="datetime-local" class="flex-1 px-3 py-2 bg-surface-base border border-edge-subtle rounded text-ink text-sm focus:outline-none focus:border-brand-500">
          <button type="button" class="bg-surface-hover text-ink-muted px-3 py-2 rounded-sm text-xs hover:bg-surface-muted transition-colors" onclick="FTRealTrade.setTradeTimeNow()">现在</button>
        </div>
        <div class="form-help">可补录历史成交,但需与实际成交时间一致</div>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="bg-surface-hover text-ink-muted px-4 py-2 rounded-sm text-sm hover:bg-surface-muted transition-colors" onclick="FTRealTrade.resetForm()">重置</button>
      <button type="button" class="bg-brand-500 text-brand-50 px-4 py-2 rounded-sm text-sm font-medium hover:bg-brand-600 transition-colors" onclick="FTRealTrade.submit()">提交</button>
    </div>
  </div>

  <!-- 最近实盘成交 -->
  <div class="bg-surface rounded-lg border border-edge-subtle p-5">
    <h2 class="font-serif text-xl text-ink-secondary mb-4">最近实盘成交</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-surface-hover">
            <th class="py-2.5 px-3 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">时间</th>
            <th class="py-2.5 px-3 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">合约</th>
            <th class="py-2.5 px-3 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">类型</th>
            <th class="py-2.5 px-3 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">价格</th>
            <th class="py-2.5 px-3 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">手数</th>
            <th class="py-2.5 px-3 text-left text-xs font-medium text-ink-muted uppercase tracking-wider">理由</th>
          </tr>
        </thead>
        <tbody id="rtRecentBody" class="divide-y divide-edge-faint"></tbody>
      </table>
    </div>
    <div id="rtEmpty" class="empty-state">暂无实盘成交记录</div>
  </div>
</main>
<script src="../shared/app-core.js"></script>
<script src="../shared/cloud-sync.js"></script>
<script src="../shared/real-trade.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    FTApp.init();
    FTApp.switchAccount('real');  // 实盘页强制锁定 real 账户
    CloudSync.init();
    FTRealTrade.init();
  });
</script>
</body>
</html>
